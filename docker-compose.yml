version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://localhost:27017/bus-ticketing-app
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  client:
    build: ./client
    ports:
      - "3000:3000"
    stdin_open: true
    volumes:
      - ./client:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: